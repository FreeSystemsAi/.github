<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="org-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0055FF"/>
      <stop offset="100%" style="stop-color:#0066FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="48" fill="white"/>

  <!-- Geometric squares pattern (from original logo, scaled up) -->
  <!-- Bottom-left blue square -->
  <rect x="60" y="120" width="72" height="72" fill="#0055FF" rx="4"/>
  <!-- Top-right blue square -->
  <rect x="132" y="48" width="72" height="72" fill="#0055FF" rx="4"/>
  <!-- Middle white square (border to show on white bg) -->
  <rect x="132" y="120" width="72" height="72" fill="white" stroke="#0055FF" stroke-width="3" rx="4"/>

  <!-- Neural network nodes extending from the geometric pattern -->
  <!-- Node connections (lines) -->
  <line x1="204" y1="84" x2="270" y2="70" stroke="#0055FF" stroke-width="2.5" opacity="0.4"/>
  <line x1="204" y1="84" x2="280" y2="120" stroke="#0055FF" stroke-width="2.5" opacity="0.4"/>
  <line x1="204" y1="156" x2="270" y2="70" stroke="#0055FF" stroke-width="2" opacity="0.25"/>
  <line x1="204" y1="156" x2="280" y2="120" stroke="#0055FF" stroke-width="2.5" opacity="0.4"/>
  <line x1="204" y1="156" x2="275" y2="175" stroke="#0055FF" stroke-width="2.5" opacity="0.4"/>
  <line x1="132" y1="192" x2="275" y2="175" stroke="#0055FF" stroke-width="2" opacity="0.25"/>

  <!-- Neural nodes -->
  <circle cx="270" cy="70" r="8" fill="#0055FF" opacity="0.6"/>
  <circle cx="280" cy="120" r="10" fill="#0055FF" opacity="0.7"/>
  <circle cx="275" cy="175" r="7" fill="#0055FF" opacity="0.5"/>

  <!-- Outer neural dots -->
  <circle cx="320" cy="55" r="5" fill="#0055FF" opacity="0.3"/>
  <circle cx="330" cy="105" r="6" fill="#0055FF" opacity="0.35"/>
  <circle cx="325" cy="155" r="4" fill="#0055FF" opacity="0.25"/>
  <line x1="270" y1="70" x2="320" y2="55" stroke="#0055FF" stroke-width="1.5" opacity="0.2"/>
  <line x1="280" y1="120" x2="330" y2="105" stroke="#0055FF" stroke-width="1.5" opacity="0.2"/>
  <line x1="275" y1="175" x2="325" y2="155" stroke="#0055FF" stroke-width="1.5" opacity="0.2"/>

  <!-- "free systems" text -->
  <text x="60" y="265" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="56" font-weight="400" fill="#111111" letter-spacing="-1">free systems</text>

  <!-- "AI" text with accent -->
  <text x="60" y="330" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#0055FF" letter-spacing="4">AI</text>

  <!-- Subtle tagline -->
  <text x="60" y="365" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="300" fill="#888888" letter-spacing="3">INTELLIGENT SYSTEMS</text>
</svg>
